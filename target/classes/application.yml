server:
  port: 8080

spring:
  application:
    name: polizas-api
  datasource:
    url: jdbc:h2:mem:polizasdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always

app:
  security:
    api-key: 123456
  business:
    ipc: 0.05
